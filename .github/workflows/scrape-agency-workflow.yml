name: Scrape Agency Grants

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run agency scraper
        run: node scrape-agency.js

      - name: Commit updated agency-grants.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agency-grants.json
          git diff --staged --quiet || git commit -m "Update agency-grants.json [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push
