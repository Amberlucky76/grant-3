name: Scrape NYS Grants

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC (1 hour before agency scraper)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run NYS scraper
        run: node scrape-nys.js

      - name: Commit updated nys-grants.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nys-grants.json
          git diff --staged --quiet || git commit -m "chore: update NYS grants data [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push
