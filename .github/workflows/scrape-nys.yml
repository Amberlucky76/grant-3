name: Scrape NYS Grants

on:
  schedule:
    # Runs every day at 6am ET (10am UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run scraper
        run: node scrape-nys.js

      - name: Commit and push nys-grants.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nys-grants.json
          git diff --cached --quiet || git commit -m "chore: update NYS grants data [$(date -u +%Y-%m-%d)]"
          git push
