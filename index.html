function saveManualGrant() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const editId = document.getElementById('edit-grant-id').value;
  const grant = {
    id: editId || ('m-' + Date.now()),
    title, agency: document.getElementById('f-agency').value.trim(),
    grantId: document.getElementById('f-id').value.trim(),
    deadline: document.getElementById('f-deadline').value.trim(),
    award: document.getElementById('f-award').value.trim(),
    status: document.getElementById('f-status').value,
    url: document.getElementById('f-url').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    addedAt: editId ? (state.manualGrants.find(x=>x.id===editId)||{}).addedAt || Date.now() : Date.now(),
  };
  if (editId) {
    state.manualGrants = state.manualGrants.map(x=>x.id===editId?grant:x);
  } else {
    state.manualGrants.push(grant);
  }
  localStorage.setItem('manualGrants', JSON.stringify(state.manualGrants));
  closeAddModalDirect();
  renderGrants();
}

function deleteManualGrant(id) {
  if (!confirm('Remove this grant?')) return;
  state.manualGrants = state.manualGrants.filter(x=>x.id!==id);

  renderGrants();
}
